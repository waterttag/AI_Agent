# ============================================================
# Alembic 数据库迁移配置
# ============================================================
# Alembic 是 SQLAlchemy 官方数据库迁移工具
# 功能：以版本化方式管理数据库 schema 变更（类似 Django Migrations）
#
# 基本命令：
#   cd backend
#   alembic init migrations                    # 初始化迁移环境（已完成）
#   alembic revision --autogenerate -m "描述"  # 自动生成迁移脚本
#   alembic upgrade head                       # 应用所有未执行迁移
#   alembic downgrade -1                       # 回滚最近一次迁移
#   alembic current                            # 查看当前迁移版本
#
# 注意：本项目使用 SQLAlchemy async 引擎，
# 需要特殊的 env.py 配置（见 backend/migrations/env.py）

[alembic]
# ---- 迁移脚本目录 ----
# 相对路径（相对于 alembic.ini 所在目录）
# 包含 versions/（迁移文件）和 env.py（执行环境）
script_location = migrations

# ---- 数据库 URL ----
# 直接写在 ini 文件中（开发环境）
# 生产环境通过 settings.get_database_url() 动态获取（见 env.py）
# sqlite+aiosqlite: 使用 aiosqlite 驱动（async 兼容）
sqlalchemy.url = sqlite+aiosqlite:///./app.db
#                |       |          |
#                |       |          └─ SQLite 文件路径（./app.db = backend/app.db）
#                |       └─ aiosqlite: async SQLite 驱动（支持 await）
#                └─ sqlite 方言（database dialect）

# ---- 日志配置 ----
[loggers]
keys = root,sqlalchemy,alembic
# 定义三个 logger 实例：
#   root:       根日志器（所有未捕获日志的默认接收者）
#   sqlalchemy: SQLAlchemy 引擎日志（SQL 语句、连接池等）
#   alembic:    Alembic 自身日志（迁移操作）

[handlers]
keys = console
# 只定义一个 handler: 输出到控制台（stderr）

[formatters]
keys = generic
# 只定义一个 formatter: 通用格式

# ---- 根日志器 ----
[logger_root]
level = WARN
# WARN: 只记录警告及以上级别（ERROR、CRITICAL）
# 减少噪音：不显示每条 SQL 语句的执行
handlers = console
# 输出到控制台

# ---- SQLAlchemy 日志器 ----
[logger_sqlalchemy]
level = WARN
# WARN: 不记录 SQL 查询（太多输出干扰迁移操作）
# 调试时可改为 DEBUG 以查看生成的 SQL 语句
handlers =
# 空 handlers: SQLAlchemy 日志继承根日志器的 handler（console）
qualname = sqlalchemy.engine
# 限定作用域：只影响 sqlalchemy.engine 命名空间下的日志
# 不包括 sqlalchemy.orm、sqlalchemy.pool 等

# ---- Alembic 日志器 ----
[logger_alembic]
level = INFO
# INFO: 记录迁移操作（生成/应用/回滚）的关键信息
# 默认 INFO 级别可以看到正在执行哪个迁移文件
handlers =
# 继承根日志器的 handler
qualname = alembic
# 只影响 alembic 命名空间

# ---- 控制台 Handler ----
[handler_console]
class = StreamHandler
# StreamHandler: 标准 Python 日志 handler，输出到流
args = (sys.stderr,)
# 输出到 stderr（标准错误流）
# 使用 stderr 而非 stdout 可以分离正常输出和日志输出
level = NOTSET
# NOTSET: 不设最低级别，由 logger 的 level 控制过滤
formatter = generic

# ---- 通用 Formatter ----
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
# 格式说明：
#   %(levelname)-5.5s: 日志级别，左对齐，最少 5 字符，截断为 5 字符
#                      例如 "WARN "、"INFO "、"ERROR"
#   %(name)s:          日志器名称（alembic / sqlalchemy.engine）
#   %(message)s:       日志消息正文
# 示例输出：INFO  [alembic] Running upgrade  -> 20240601_xxxxx
datefmt = %H:%M:%S
# 时间格式：时:分:秒（不显示日期，迁移操作一般很快完成）
