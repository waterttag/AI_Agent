<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f23; display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: Arial, sans-serif;
}
#app { text-align: center; color: #fff; max-width: 500px; width: 100%; padding: 20px; }
h1 { font-size: 28px; margin-bottom: 4px; color: #a78bfa; }
#info { display: flex; justify-content: space-between; margin: 12px 0; font-size: 16px; color: #aaa; }
#grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 16px; }
.card {
  aspect-ratio: 1; background: #1e1e3a; border-radius: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 36px;
  transition: transform 0.3s, background 0.3s; user-select: none;
  border: 2px solid #2a2a4a;
}
.card:hover { transform: scale(1.05); border-color: #a78bfa; }
.card.flipped { background: #2d1b69; border-color: #a78bfa; transform: rotateY(180deg); }
.card.matched { background: #1a3a1a; border-color: #4ade80; cursor: default; }
#reset { background: #a78bfa; color: #000; border: none; padding: 12px 32px; font-size: 16px;
  border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 16px; }
#reset:hover { background: #8b6cf0; }
#message { font-size: 24px; color: #4ade80; margin-top: 12px; min-height: 36px; }
</style>
</head>
<body>
<div id="app">
  <h1>Memory Match</h1>
  <div id="info">
    <span id="moves">Moves: 0</span>
    <span id="pairs">Pairs: 0/8</span>
  </div>
  <div id="grid"></div>
  <div id="message"></div>
  <button id="reset" onclick="resetGame()">New Game</button>
</div>
<script>
const emojis = ['🐶','🐱','🦊','🐸','🦄','🐙','🦋','🌻','🐶','🐱','🦊','🐸','🦄','🐙','🦋','🌻'];
let cards = []; let flipped = []; let matched = []; let moves = 0; let locked = false;

function shuffle(arr) { for (let i = arr.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    if (flipped.includes(i) || matched.includes(i)) {
      card.classList.add('flipped');
      card.textContent = emoji;
    }
    if (matched.includes(i)) card.classList.add('matched');
    card.addEventListener('click', () => flipCard(i));
    grid.appendChild(card);
  });
  document.getElementById('moves').textContent = 'Moves: ' + moves;
  document.getElementById('pairs').textContent = 'Pairs: ' + matched.length/2 + '/8';
  if (matched.length === 16) {
    document.getElementById('message').textContent = '🎉 You Win!';
  }
}

function flipCard(i) {
  if (locked || flipped.includes(i) || matched.includes(i)) return;
  if (flipped.length === 2) return;
  flipped.push(i); moves++;
  render();
  if (flipped.length === 2) {
    locked = true;
    const [a, b] = flipped;
    if (cards[a] === cards[b]) {
      matched.push(a, b); flipped = []; locked = false;
      render();
    } else {
      setTimeout(() => { flipped = []; locked = false; render(); }, 800);
    }
  }
}

function resetGame() {
  cards = shuffle([...emojis]); flipped = []; matched = []; moves = 0; locked = false;
  document.getElementById('message').textContent = '';
  render();
}
resetGame();
</script>
</body>
</html>
